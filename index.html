<!DOCTYPE html> 
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ชาโดว์แบล็คไนท์ - Links</title> 
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า Google Fonts: Kanit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- นำเข้า Font Awesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --neon-cyan: #00f2fe;
            --neon-pink: #ff007f;
            --bg-color: #030308; 
            --glass-bg: rgba(15, 15, 25, 0.4);
            --ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            /* เพิ่ม Texture Noise บางๆ ระดับพรีเมียม */
            background-image: radial-gradient(circle at 50% 0%, rgba(26, 20, 50, 0.5) 0%, transparent 60%),
                              url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .main-container {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 10;
            padding: 50px 24px 80px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Profile Glow Aura - World Class Design */
        .profile-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-glow {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-cyan), var(--neon-pink));
            filter: blur(20px);
            opacity: 0.5;
            animation: pulse-glow 4s ease-in-out infinite alternate;
        }

        @keyframes pulse-glow {
            0% { transform: scale(0.95); opacity: 0.4; }
            100% { transform: scale(1.05); opacity: 0.7; }
        }

        .profile-inner {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background-color: var(--bg-color);
            z-index: 2;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        .donate-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 242, 254, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 13px;
            font-weight: 500;
            color: #bbf7d0;
            margin-top: 16px;
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.1);
            letter-spacing: 0.3px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--neon-cyan);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--neon-cyan);
            animation: dot-pulse 1.5s infinite;
        }

        @keyframes dot-pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        /* Premium Gradient Border Buttons (The Vercel/Linear approach) */
        .glass-btn {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            min-height: 68px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            padding: 12px 18px;
            margin-bottom: 18px;
            transition: all 0.4s var(--ease-spring);
            z-index: 1;
        }

        /* สร้างเส้นขอบบางเฉียบแบบไล่สี (Gradient Border 1px) */
        .glass-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px; /* ความหนาเส้นขอบ */
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.02) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            z-index: -1;
            transition: all 0.4s var(--ease-spring);
        }

        .glass-btn:hover {
            transform: translateY(-4px) scale(1.01);
            background: rgba(30, 30, 45, 0.6);
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.5), 
                        0 0 20px rgba(0, 242, 254, 0.15);
        }

        .glass-btn:hover::before {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
        }

        .glass-btn:active {
            transform: translateY(1px) scale(0.99);
            transition: all 0.1s;
        }

        .btn-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.1);
        }

        .btn-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s var(--ease-spring);
        }

        .glass-btn:hover .btn-icon img {
            transform: scale(1.1);
        }

        .btn-text {
            flex-grow: 1;
            text-align: center;
            padding: 0 10px;
            padding-right: 48px;
            letter-spacing: 0.2px;
        }

        /* Premium Social Icons */
        .social-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.6);
            font-size: 22px;
            transition: all 0.4s var(--ease-spring);
            text-decoration: none;
            backdrop-filter: blur(10px);
        }

        .social-icon:hover {
            color: #ffffff;
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
        }

        .social-youtube:hover { border-color: #ff0000; box-shadow: 0 8px 20px rgba(255, 0, 0, 0.3); color: #ff4d4d; }
        .social-tiktok:hover { border-color: #00f2fe; box-shadow: 0 8px 20px rgba(0, 242, 254, 0.3); color: #00f2fe; }
        .social-discord:hover { border-color: #5865F2; box-shadow: 0 8px 20px rgba(88, 101, 242, 0.3); color: #8ea1ff; }

    </style>
</head>
<body>

    <!-- พื้นหลังพาร์ติเคิลแบบละอองดาว -->
    <canvas id="particle-canvas"></canvas>

    <main class="main-container">
        
        <!-- ส่วนโปรไฟล์ -->
        <header class="flex flex-col items-center w-full mb-10">
            <div class="profile-container">
                <div class="profile-glow"></div>
                <div class="profile-inner">
                    <!-- รูปโปรไฟล์ -->
                    <img src="ชาโดว์.jpeg" alt="Profile Picture" class="w-full h-full object-cover">
                </div>
            </div>
            
            <h1 class="text-3xl font-bold mb-2 tracking-wide text-gradient">ชาโดว์แบล็คไนท์</h1>
            
            <p class="text-center text-[15px] leading-relaxed opacity-70 text-gray-300 font-light max-w-[90%]">
                อัศวินเงาดำเเห่งเปิดให้บริการ<br>
                <span class="font-medium text-transparent bg-clip-text bg-gradient-to-r from-[#00f2fe] to-[#ff007f]">SHADOW BLACK KNIGHT ⚔️</span>
            </p>

            <div class="donate-badge">
                <div class="pulse-dot"></div>
                ลิงก์โดเนทตามลิงก์ด้านล่างได้เลยนะ
            </div>
        </header>

        <!-- ไอคอน Social Media -->
        <nav class="flex gap-6 mb-12">
            <a href="https://www.youtube.com/@shadowoi_k2" target="_blank" rel="noopener noreferrer" class="social-icon social-youtube">
                <i class="fa-brands fa-youtube"></i>
            </a>
            <a href="https://www.tiktok.com/@shadowoi_v2?_r=1&_t=ZS-973movlP7Ui" target="_blank" rel="noopener noreferrer" class="social-icon social-tiktok">
                <i class="fa-brands fa-tiktok"></i>
            </a>
            <a href="https://discord.gg/Pna3NUbgv" target="_blank" rel="noopener noreferrer" class="social-icon social-discord">
                <i class="fa-brands fa-discord"></i>
            </a>
        </nav>

        <!-- รายการปุ่มลิงก์ -->
        <section class="w-full flex flex-col">
            
            <!-- ปุ่มที่ 1: โปเกเด็กซ์ -->
            <a href="https://pokedex-project1-livid.vercel.app/" target="_blank" rel="noopener noreferrer" class="glass-btn external-link">
                <div class="btn-icon bg-[#1a1a24]">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" alt="Pikachu" style="transform: scale(1.4);">
                </div>
                <span class="btn-text">โปเกเด็กซ์</span>
            </a>

            <!-- ปุ่มที่ 2: โดเนท -->
            <a href="https://easydonate.app/shadowoi_k2" target="_blank" rel="noopener noreferrer" class="glass-btn external-link">
                <div class="btn-icon bg-white">
                    <img src="easydonate.jpg" alt="EasyDonate Logo" class="p-1">
                </div>
                <span class="btn-text">ลิ้งโดนเนทขึ้นจอ ขั้นต่ำ 1 บูด</span>
            </a>

            <!-- ปุ่มที่ 3: TikTok Coins -->
            <a href="https://www.tiktok.com/coin?rc=QA55AANU" target="_blank" rel="noopener noreferrer" class="glass-btn external-link">
                <div class="btn-icon bg-white">
                    <img src="tiktok-coins.jpg" alt="TikTok Coins" class="p-1">
                </div>
                <span class="btn-text">TikTok Coins</span>
            </a>

        </section>

    </main>

    <!-- Script สำหรับ Canvas Particles (พื้นหลัง) และ Bypass ลิงก์ -->
    <script>
        // 1. ระบบแก้บล็อกเบราว์เซอร์ของแอป (Bypass In-App Browser)
        document.querySelectorAll('.external-link').forEach(link => {
            link.addEventListener('click', function(e) {
                const targetUrl = this.href;
                const userAgent = navigator.userAgent || navigator.vendor || window.opera;
                const isAndroid = /android/i.test(userAgent);
                const isInAppBrowser = /Line|TikTok|FBAN|FBAV|Instagram/i.test(userAgent);

                if (isAndroid && isInAppBrowser) {
                    e.preventDefault();
                    const intentUrl = `intent://${targetUrl.replace(/^https?:\/\//i, '')}#Intent;scheme=https;package=com.android.chrome;end`;
                    window.location.href = intentUrl;
                }
            });
        });

        // 2. ระบบ Cinematic Bokeh Particles (ระดับโลก)
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        const particleCount = 45; // ลดจำนวนลงแต่เพิ่มขนาดให้ดูเป็น Bokeh หรูๆ

        function initCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.3; // เคลื่อนที่ช้าลงให้ดูผู้ดี
                this.vy = (Math.random() - 0.5) * 0.3;
                this.radius = Math.random() * 4 + 1; // ขนาดหลากหลายขึ้น
                this.baseAlpha = Math.random() * 0.5 + 0.1;
                this.color = Math.random() > 0.5 ? '0, 242, 254' : '255, 0, 127'; 
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                // ให้วาร์ปข้ามจอแทนการเด้ง เพื่อความสมูท
                if (this.x < -20) this.x = width + 20;
                if (this.x > width + 20) this.x = -20;
                if (this.y < -20) this.y = height + 20;
                if (this.y > height + 20) this.y = -20;
            }
            draw() {
                // สร้างเอฟเฟกต์แสงฟุ้ง (Glow)
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 3);
                gradient.addColorStop(0, `rgba(${this.color}, ${this.baseAlpha})`);
                gradient.addColorStop(1, `rgba(${this.color}, 0)`);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // แกนกลางแสง
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.baseAlpha + 0.2})`;
                ctx.fill();
            }
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            // ลบเฟรมเก่าแบบทิ้งคราบแสงนิดๆ (Trail effect)
            ctx.fillStyle = 'rgba(3, 3, 8, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => {
            initCanvas();
            createParticles();
        });

        // Start
        initCanvas();
        createParticles();
        animateParticles();
    </script>
</body>
</html>
