    <style>
        :root {
            --brand-pink: #ec4899;
            --brand-purple: #8b5cf6;
            --brand-cyan: #06b6d4;
            --glass-bg: rgba(15, 20, 31, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);

        body {

            background-color: #050814;
            color: #f8fafc;
            overflow-x: hidden;
            margin: 0;
            min-height: 100vh;
            /* แทรกฟอนต์ Inter สำหรับตัวเลขหรือคำภาษาอังกฤษ */
            font-feature-settings: "ss01", "ss02", "cv01", "cv02";
        }

        /* ----- Background Overlay & Noise (Texture) ----- */
        .bg-noise {
            position: fixed;
            inset: 0;
            z-index: -2;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* ----- Premium Profile Ring ----- */
        .profile-container {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--brand-pink), var(--brand-purple), var(--brand-cyan), var(--brand-pink));
            animation: spin 4s linear infinite;
            z-index: 1;
            filter: blur(8px);
            opacity: 0.8;
            transition: opacity 0.5s ease, filter 0.5s ease;
        }

        .profile-container:hover .profile-ring {
            opacity: 1;
            filter: blur(12px);
        }

        .profile-image-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            z-index: 2;
            padding: 4px;
            background: #050814; /* ตัดขอบให้เนียน */
        }

        .profile-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .profile-container:hover .profile-image-wrapper img {
            transform: scale(1.05);
        }

        /* ----- High-End Glassmorphism Buttons ----- */
        .link-btn {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            min-height: 68px;
            padding: 8px 16px 8px 8px;
            margin-bottom: 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; /* ขอบมนแบบ Modern Apple-style */
            text-decoration: none;
            color: #fff;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease, border-color 0.4s ease;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5), inset 0 1px 0 var(--glass-shine);
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.06), transparent);
            transform: skewX(-20deg);
            transition: left 0.7s ease;
            z-index: 1;
        }

        .link-btn:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6), 0 0 20px -5px var(--brand-purple), inset 0 1px 0 var(--glass-shine);
        }

        .link-btn:hover::before {
            left: 200%;
        }

        /* ----- Link Icon Container ----- */
        .btn-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px; /* Squircle shape */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 2;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .link-btn:hover .btn-icon {
            transform: scale(1.05);
            border-color: rgba(255,255,255,0.3);
        }

        .btn-text {
            flex-grow: 1;
            text-align: center;
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            z-index: 2;
            padding-right: 44px; /* ชดเชยให้ข้อความอยู่ตรงกลาง */
        }

        /* ----- Typography Gradients ----- */
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(135deg, #fff 0%, #cbd5e1 50%, #94a3b8 100%);
        }
        
        .text-gradient-brand {

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to right, var(--brand-purple), var(--brand-pink));
        }

        /* ----- Animations ----- */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes floatY {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .animate-float { animation: floatY 4s ease-in-out infinite; }
    </style>
</head>

<body class="relative antialiased selection:bg-pink-500 selection:text-white">

    <!-- World-Class Particle System Javascript -->
    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let w, h;
        
        // สำหรับหน้าจอความละเอียดสูง (Retina Displays)
        const pixelRatio = window.devicePixelRatio || 1;

        function init() {
            w = window.innerWidth;
            h = window.innerHeight;
            
            canvas.width = w * pixelRatio;
            canvas.height = h * pixelRatio;
            ctx.scale(pixelRatio, pixelRatio);
            
            particles = [];
            // ปรับจำนวนจุดให้ดูคลีน ไม่รกจนเกินไป
            const particleCount = Math.floor((w * h) / 18000); 
            
            for(let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    size: Math.random() * 1.5 + 0.5,
                    opacity: Math.random() * 0.5 + 0.2, // สร้างความลึก (Parallax feel)
                    color: Math.random() > 0.5 ? '#ec4899' : '#06b6d4'
                });
            }
        }

        function draw() {
            requestAnimationFrame(draw);
            ctx.clearRect(0, 0, w, h);
            
            // วาดจุดและเส้น
            for(let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;

                // ขอบจอวนลูปแบบนุ่มนวล
                if(p.x < -10) p.x = w + 10;
                if(p.x > w + 10) p.x = -10;
                if(p.y < -10) p.y = h + 10;
                if(p.y > h + 10) p.y = -10;

                // วาดจุด
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                
                // ให้สีสว่างขึ้นตามค่า opacity
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.opacity;
                ctx.fill();

                // ลากเส้นเชื่อม
                for(let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dx = p.x - p2.x;
                    let dy = p.y - p2.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if(dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        // คำนวณความโปร่งแสงของเส้นให้เนียนตามระยะห่าง
                        let lineOpacity = (1 - (dist / 100)) * 0.15;
                        ctx.strokeStyle = `rgba(255, 255, 255, ${lineOpacity})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            // Reset alpha
            ctx.globalAlpha = 1;
        }

        // รองรับการย่อขยายหน้าจอแบบสมูท
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(init, 200);
        });

        init();
        draw();
    </script>
